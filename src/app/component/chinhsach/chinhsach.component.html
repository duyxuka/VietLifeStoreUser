<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcrumb-bg.html">
    <div class="container">
    <div class="breadcumb-content">
        <h1 class="breadcumb-title" data-cue="slideInUp">Chính sách</h1>
        <ul class="breadcumb-menu">
            <li data-cue="slideInUp" data-delay="100"><a href="index.html">Trang chủ</a></li>
            <li data-cue="slideInUp" data-delay="100">Chính sách</li>
        </ul>
    </div>
    </div>
</div>
<div class="space overflow-hidden">
    <div class="container">
    <div class="row gy-40 justify-content-center">
        <div class="col-xxl-9 col-lg-8 align-self-center">
            <div class="faq-tab-wrap">
                <h3 class="faq-title text-center">{{ selectedDanhMucName }}</h3>
                <div class="accordion" id="faqAccordion">
                <div class="accordion-card" *ngFor="let item of chinhSachList; let i = index">
                    <div class="accordion-header">
                        <button class="accordion-button"
                                type="button"
                                [class.collapsed]="openedIndex !== i"
                                (click)="toggleAccordion(i)">
                        {{ i + 1 }}. {{ item.tieuDe }}
                        </button>
                    </div>

                    <div class="accordion-collapse collapse"
                        [class.show]="openedIndex === i">

                        <div class="accordion-body">
                            <div [innerHTML]="item.noiDung"></div>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
        <div class="col-xxl-3 col-lg-4 sidebar-wrap">
            <aside class="sidebar-area">
                <div class="widget widget_categories">
                <h3 class="widget_title">Chính sách</h3>
                <ul>
                    <!-- <li><a href="blog.html" class="active">Chính sách đổi trả</a> <span class="active">12</span></li> -->
                    <li *ngFor="let item of danhMucList">
                        <a href="javascript:void(0)"
                        [class.active]="item.id === selectedDanhMucId"
                        (click)="selectDanhMuc(item.id)">
                        {{ item.ten }}
                        </a>
                    </li>
                </ul>
                </div>
            </aside>
        </div>
    </div>
    </div>
</div>
