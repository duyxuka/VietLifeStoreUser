<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcrumb-bg.html">
    <div class="container">
        <div class="breadcumb-content">
            <h1 class="breadcumb-title" >Đăng ký</h1>
            <ul class="breadcumb-menu">
                <li  data-delay="100">
                    <a href="/">Trang chủ</a>
                </li>
                <li  data-delay="100">Đăng ký</li>
            </ul>
        </div>
    </div>
</div>

<div class="ot-checkout-wrapper space-top space-extra-bottom">
    <div class="container">
        <div class="row">
            <div class="col-12">

                <form class="woocommerce-form-login"
                    [formGroup]="form"
                    (ngSubmit)="register()">

                    <!-- Họ tên -->
                    <div class="form-group">
                        <label>Họ và tên *</label>
                        <input type="text"
                            class="form-control"
                            formControlName="fullName"
                            placeholder="Nhập họ và tên">
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email"
                            class="form-control"
                            formControlName="email"
                            placeholder="Nhập email">
                    </div>

                    <!-- SĐT -->
                    <div class="form-group">
                        <label>Số điện thoại *</label>
                        <input type="text"
                            class="form-control"
                            formControlName="phoneNumber"
                            placeholder="Nhập số điện thoại">
                    </div>

                    <!-- Mật khẩu -->
                    <div class="form-group">
                        <label>Mật khẩu *</label>
                        <input type="password"
                            class="form-control"
                            formControlName="password"
                            placeholder="Nhập mật khẩu">
                    </div>

                    <!-- Xác nhận mật khẩu -->
                    <div class="form-group">
                        <label>Xác nhận mật khẩu *</label>
                        <input type="password"
                            class="form-control"
                            formControlName="confirmPassword"
                            placeholder="Nhập lại mật khẩu">
                    </div>

                    <!-- Button -->
                    <div class="form-group">
                        <button type="submit" class="ot-btn">
                            Đăng ký
                        </button>

                        <p class="mt-3 mb-0">
                            <a class="text-reset" href="/dangnhap">
                                Đã có tài khoản? Đăng nhập
                            </a>
                        </p>
                    </div>
                    <div *ngIf="errorMessage" class="text-danger mt-2">
                        {{ errorMessage }}
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
