<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcrumb-bg.html">
    <div class="container">
        <div class="breadcumb-content">
            <h1 class="breadcumb-title" >Đăng ký</h1>
            <ul class="breadcumb-menu">
                <li  data-delay="100">
                    <a href="/">Trang chủ</a>
                </li>
                <li  data-delay="100">Đăng ký</li>
            </ul>
        </div>
    </div>
</div>

<div class="ot-checkout-wrapper space-top space-extra-bottom">
    <div class="container">
        <div class="row">
            <div class="col-12">

                <form class="woocommerce-form-login row"
                    [formGroup]="form"
                    (ngSubmit)="register()">

                    <!-- Họ tên -->
                    <div class="form-group col-lg-6">
                        <label>Họ và tên <span class="text-danger">*</span></label>
                        <input type="text"
                            class="form-control"
                            formControlName="fullName"
                            placeholder="Nhập họ và tên">
                        <small class="text-danger" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.invalid">
                            Họ tên không được để trống
                        </small>
                    </div>

                    <!-- Email -->
                    <div class="form-group col-lg-6">
                        <label>Email <span class="text-danger">*</span></label>
                        <input type="email"
                            class="form-control"
                            formControlName="email"
                            placeholder="Nhập email">
                            <small class="text-danger" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']">
                                Email không được để trống
                            </small>

                            <small class="text-danger" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
                                Email không hợp lệ
                            </small>
                    </div>

                    <!-- SĐT -->
                    <div class="form-group">
                        <label>Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text"
                            class="form-control"
                            formControlName="phoneNumber"
                            placeholder="Nhập số điện thoại">
                            <small class="text-danger" *ngIf="form.get('phoneNumber')?.touched && form.get('phoneNumber')?.invalid">
                                Số điện thoại phải 10 số
                            </small>
                    </div>

                    <!-- Mật khẩu -->
                    <div class="form-group col-lg-6">
                        <label>Mật khẩu <span class="text-danger">*</span></label>
                        <div class="password-input">
                            <input [type]="showPassword ? 'text':'password'" class="form-control" formControlName="password" placeholder="Nhập mật khẩu">
                            <button type="button" class="eye-btn" (click)="showPassword=!showPassword">

                            <i class="fa" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
                            </button>
                        </div>
                        <small class="text-danger"
                            *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['minlength']">
                            Mật khẩu tối thiểu 6 ký tự
                        </small>
                    </div>

                    <!-- Xác nhận mật khẩu -->
                    <div class="form-group col-lg-6">
                        <label>Xác nhận mật khẩu <span class="text-danger">*</span></label>
                        <div class="password-input">
                            <input [type]="showConfirmPassword ? 'text':'password'" class="form-control" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu">
                            <button type="button" class="eye-btn" (click)="showConfirmPassword=!showConfirmPassword">

                            <i class="fa" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
                            </button>
                        </div>
                        <small class="text-danger"
                            *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched">
                            Mật khẩu xác nhận không khớp
                        </small>
                    </div>

                    <!-- Button -->
                    <div class="form-group">
                        <button type="submit" class="ot-btn" [disabled]="form.invalid || isLoading">
                            {{isLoading ? 'Đang đăng ký...' : 'Đăng ký'}}
                        </button>

                        <p class="mt-3 mb-0">
                            <a class="text-reset" href="/dangnhap">
                                Đã có tài khoản? Đăng nhập
                            </a>
                        </p>
                    </div>
                    <div *ngIf="errorMessage" class="text-danger mt-2">
                        {{ errorMessage }}
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
