<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcrumb-bg.html">
    <div class="container">
    <div class="breadcumb-content">
        <h1 class="breadcumb-title" >Đăng nhập</h1>
        <ul class="breadcumb-menu">
            <li  data-delay="100"><a href="/">Trang chủ</a></li>
            <li  data-delay="100">Đăng nhập</li>
        </ul>
    </div>
    </div>
</div>
<div class="ot-checkout-wrapper space-top space-extra-bottom">
    <div class="container">
    <div class="row">
        <div class="col-12">
            <form action="#" class="woocommerce-form-login" [formGroup]="form" (ngSubmit)="login()">
                <div class="form-group"><label>Email hoặc SĐT *</label> <input type="text" class="form-control" formControlName="emailorphone" placeholder="Nhập Email hoặc SĐT"></div>
                <div class="form-group"><label>Mật khẩu *</label> <input type="password" class="form-control" formControlName="password" placeholder="Nhập mật khẩu"></div>
                <div class="form-group">
                </div>
                <div class="form-group">
                <button type="submit" class="ot-btn">Đăng nhập</button>
                <p class="mt-3 mb-0">
                <a class="text-reset" href="javascript:void(0)" (click)="toggleForgot()">
                    Quên mật khẩu?
                </a>
                </p>

                <div *ngIf="showForgot" class="mt-3">
                <input
                type="email"
                class="form-control"
                formControlName="forgotEmail"
                placeholder="Nhập email của bạn">

                <button class="ot-btn mt-2 w-100" (click)="sendReset()">
                    Gửi yêu cầu đặt lại mật khẩu
                </button>
                </div>
                <p class="mt-3 mb-0"><a class="text-reset" href="/dangky">Chưa có tài khoản? Đăng ký ngay</a></p>
                </div>
            </form>
        </div>
    </div>
    </div>
</div>
