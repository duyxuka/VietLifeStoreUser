<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcrumb-bg.html">
    <div class="container">
    <div class="breadcumb-content">
        <h1 class="breadcumb-title" >Đăng nhập</h1>
        <ul class="breadcumb-menu">
            <li  data-delay="100"><a href="/">Trang chủ</a></li>
            <li  data-delay="100">Đăng nhập</li>
        </ul>
    </div>
    </div>
</div>
<div class="ot-checkout-wrapper space-top space-extra-bottom">
    <div class="container">
    <div class="row">
        <div class="col-12">
            <form action="#" class="woocommerce-form-login" [formGroup]="form" (ngSubmit)="login()">
                <div class="form-group">
                    <label>Email hoặc SĐT <span class="text-danger">*</span></label> 
                    <input type="text" class="form-control" formControlName="emailorphone" placeholder="Nhập Email hoặc SĐT">
                    <small class="text-danger" *ngIf="form.get('emailorphone')?.invalid && form.get('emailorphone')?.touched">
                        Email hoặc SĐT phải tối thiểu 3 ký tự
                    </small>
                </div>
                <div class="form-group">
                    <label>Mật khẩu <span class="text-danger">*</span></label> 
                    <div class="password-input">
                        <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="password" placeholder="Nhập mật khẩu">

                        <button type="button" class="eye-btn" (click)="togglePassword()">
                            <i class="fa" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
                        </button>
                    </div>
                    <small class="text-danger" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
                        Mật khẩu phải tối thiểu 6 ký tự
                    </small>
                </div>
                <div class="form-group">
                </div>
                <div class="form-group">
                <button type="submit" class="ot-btn">Đăng nhập</button>
                <p class="mt-3 mb-0">
                <a class="text-reset" href="javascript:void(0)" (click)="toggleForgot()">
                    Quên mật khẩu?
                </a>
                </p>

                <div *ngIf="showForgot" class="mt-3">
                <input
                type="email"
                class="form-control"
                formControlName="forgotEmail"
                placeholder="Nhập email của bạn">

                <button class="ot-btn mt-2 w-100" (click)="sendReset()">
                    Gửi yêu cầu đặt lại mật khẩu
                </button>
                </div>
                <p class="mt-3 mb-0"><a class="text-reset" href="/dangky">Chưa có tài khoản? Đăng ký ngay</a></p>
                </div>
            </form>
        </div>
    </div>
    </div>
</div>
