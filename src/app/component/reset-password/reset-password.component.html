<div class="ot-checkout-wrapper space-top space-extra-bottom">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div class="card shadow p-4 rounded-4">

          <h3 class="text-center mb-4">Đặt lại mật khẩu</h3>

          <form *ngIf="!success" [formGroup]="form" (ngSubmit)="submit()">

            <div class="form-group mb-3">
              <label>Mật khẩu mới <span class="text-danger">*</span></label>
              <input type="password"
                     class="form-control"
                     formControlName="newPassword"
                     placeholder="Nhập mật khẩu mới">
            </div>

            <div class="form-group mb-3">
              <label>Xác nhận mật khẩu <span class="text-danger">*</span></label>
              <input type="password"
                     class="form-control"
                     formControlName="confirmPassword"
                     placeholder="Nhập lại mật khẩu">
            </div>

            <button class="ot-btn w-100" [disabled]="loading">
              {{ loading ? 'Đang xử lý...' : 'Đặt lại mật khẩu' }}
            </button>
          </form>

          <div *ngIf="success" class="text-center">
            <h5 class="text-success">Đặt lại mật khẩu thành công!</h5>
            <button class="ot-btn mt-3 w-100" (click)="goLogin()">
              Đăng nhập ngay
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>
